<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aswin's Money Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-bottom: 100px; }
        input, select { border: 1px solid #e2e8f0 !important; }
        .tab-active { color: #2563eb; border-top: 3px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="page-dashboard" class="p-4 space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Aswin's <span class="text-blue-600">Money Manager</span></h1>
            <button onclick="exportToCSV()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold active:scale-95 transition-all shadow-md">
                📊 EXCEL EXPORT
            </button>
        </div>

        <div id="export-reminder" class="text-center p-2 rounded-lg text-[10px] font-bold uppercase tracking-wider"></div>
        
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Monthly Count</p>
                <p id="stat-month-count" class="text-2xl font-black">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-500 uppercase font-bold text-green-600">Received</p>
                <p id="stat-money-in" class="text-2xl font-black text-green-600">$0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 col-span-2">
                <p class="text-[10px] text-gray-500 uppercase font-bold text-red-500">Total Pending</p>
                <p id="stat-pending" class="text-2xl font-black text-red-500">$0</p>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl shadow-lg text-white">
            <h2 class="text-lg font-semibold mb-4 text-center">Quick Service Entry</h2>
            <div class="space-y-3">
                <input id="in-name" type="text" placeholder="Customer Name" class="w-full p-3 rounded-lg text-black outline-none">
                <div class="flex gap-2">
                    <input id="in-date" type="date" class="w-1/2 p-3 rounded-lg text-black outline-none">
                    <input id="in-time" type="time" class="w-1/2 p-3 rounded-lg text-black outline-none">
                </div>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-400 font-bold">CAD</span>
                    <input id="in-amount" type="number" value="15" class="w-full p-3 pl-14 rounded-lg text-black outline-none">
                </div>
                <select id="in-status" class="w-full p-3 rounded-lg text-black outline-none">
                    <option value="Pending">Pending</option>
                    <option value="Paid">Paid</option>
                </select>
                <button onclick="addEntry()" class="w-full bg-blue-500 text-white font-bold py-4 rounded-xl active:scale-95 transition-transform shadow-md">SAVE TO LOG</button>
            </div>
        </div>

        <div class="pt-10 flex justify-center">
             <button onclick="clearAllData()" class="text-gray-300 text-[10px] uppercase font-bold tracking-widest hover:text-red-400">Clear All Data</button>
        </div>
    </div>

    <div id="page-calendar" class="hidden p-4">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Service Log</h1>
        
        <div id="weekly-summary" class="bg-blue-600 text-white p-4 rounded-xl mb-6 flex justify-between items-center shadow-md">
            <div>
                <p class="text-[10px] opacity-80 uppercase font-bold">This Week's Stats</p>
                <p id="week-total-sessions" class="font-bold">Sessions: 0</p>
            </div>
            <div class="text-right font-mono">
                <p id="week-earned" class="text-green-300 font-bold">+$0</p>
                <p id="week-pending" class="text-red-300 font-bold">-$0</p>
            </div>
        </div>

        <input type="date" id="calendar-filter" onchange="renderCalendar()" class="w-full p-3 mb-4 border rounded-lg shadow-sm">
        <div id="calendar-list" class="space-y-3 pb-4"></div>
    </div>

    <div id="page-customers" class="hidden p-4">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">Clients</h1>
        
        <div class="bg-red-50 border border-red-100 p-3 rounded-xl mb-4 flex justify-between items-center">
            <span class="text-[10px] uppercase font-black text-red-400">Total Money Owed:</span>
            <span id="global-pending" class="text-xl font-black text-red-600">CAD 0</span>
        </div>

        <input type="text" id="customer-search" placeholder="Search clients..." oninput="renderCustomers()" class="w-full p-3 mb-4 border rounded-lg shadow-sm">
        <div id="customer-list" class="space-y-3"></div>
    </div>

    <div id="modal-profile" class="hidden fixed inset-0 bg-white z-50 p-4 overflow-y-auto">
        <button onclick="closeProfile()" class="text-blue-600 mb-6 font-bold flex items-center gap-2">
            <span>←</span> Back to List
        </button>
        <div id="profile-content"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 pb-8 shadow-2xl z-40">
        <button onclick="showPage('dashboard')" class="flex flex-col items-center text-gray-400" id="nav-dashboard">
            <span class="text-[10px] font-black uppercase">Dashboard</span>
        </button>
        <button onclick="showPage('calendar')" class="flex flex-col items-center text-gray-400" id="nav-calendar">
            <span class="text-[10px] font-black uppercase">Log</span>
        </button>
        <button onclick="showPage('customers')" class="flex flex-col items-center text-gray-400" id="nav-customers">
            <span class="text-[10px] font-black uppercase">Clients</span>
        </button>
    </nav>

    <script>
        let services = JSON.parse(localStorage.getItem('aswin_money_data')) || [];
        let lastExport = localStorage.getItem('aswin_last_export') || null;
        let currentProfileName = "";

        function save() { localStorage.setItem('aswin_money_data', JSON.stringify(services)); }

        function showPage(pageId) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            
            // Handle Navigation Styling
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('text-blue-600', 'tab-active'));
            document.getElementById('nav-' + pageId).classList.add('text-blue-600', 'tab-active');

            if(pageId === 'dashboard') renderDashboard();
            if(pageId === 'calendar') renderCalendar();
            if(pageId === 'customers') renderCustomers();
        }

        function addEntry() {
            const entry = {
                id: Date.now(),
                name: document.getElementById('in-name').value.trim(),
                date: document.getElementById('in-date').value,
                time: document.getElementById('in-time').value,
                amount: parseFloat(document.getElementById('in-amount').value),
                status: document.getElementById('in-status').value
            };
            if(!entry.name || !entry.date) return alert("Please fill in Name and Date");
            services.push(entry);
            save();
            document.getElementById('in-name').value = '';
            renderDashboard();
            alert("Record Saved!");
        }

        function deleteEntry(id) {
            if(!confirm("Delete this record permanently?")) return;
            services = services.filter(s => s.id !== id);
            save();
            renderCalendar();
            renderDashboard();
        }

        function clearAllData() {
            if(!confirm("DANGER: This will wipe all records. Proceed?")) return;
            services = [];
            save();
            localStorage.removeItem('aswin_last_export');
            location.reload();
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            const filterDate = document.getElementById('calendar-filter').value;
            list.innerHTML = '';
            const now = new Date();
            const currentWeek = getWeekNumber(now);
            const weekEntries = services.filter(s => getWeekNumber(new Date(s.date)) === currentWeek);
            
            document.getElementById('week-total-sessions').innerText = `Sessions: ${weekEntries.length}`;
            document.getElementById('week-earned').innerText = `+$${weekEntries.filter(s => s.status === 'Paid').reduce((a, b) => a + b.amount, 0)}`;
            document.getElementById('week-pending').innerText = `-$${weekEntries.filter(s => s.status === 'Pending').reduce((a, b) => a + b.amount, 0)}`;

            const filtered = filterDate ? services.filter(s => s.date === filterDate) : services;
            filtered.sort((a,b) => b.id - a.id).forEach(s => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 ${s.status === 'Paid' ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex-1">
                            <p class="font-bold text-gray-800">${s.name}</p>
                            <p class="text-[10px] text-gray-400 font-mono">${s.date} | ${s.time}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-lg text-slate-700">CAD ${s.amount}</p>
                            <div class="flex gap-2 mt-2 justify-end items-center">
                                <button onclick="deleteEntry(${s.id})" class="bg-red-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase shadow-sm">Delete</button>
                                ${s.status === 'Pending' ? `<button onclick="markPaid(${s.id})" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] font-black shadow-sm uppercase">Mark Paid</button>` : '<span class="text-green-600 font-bold text-[10px] uppercase tracking-wider">Confirmed</span>'}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function markPaid(id) {
            const idx = services.findIndex(s => s.id === id);
            services[idx].status = 'Paid';
            save();
            renderCalendar();
            renderDashboard();
        }

        function renderDashboard() {
            const now = new Date();
            const thisMonth = now.toISOString().substring(0, 7);
            const monthEntries = services.filter(s => s.date.startsWith(thisMonth));
            document.getElementById('stat-month-count').innerText = monthEntries.length;
            document.getElementById('stat-money-in').innerText = "CAD " + services.filter(s => s.status === 'Paid').reduce((a, b) => a + b.amount, 0);
            document.getElementById('stat-pending').innerText = "CAD " + services.filter(s => s.status === 'Pending').reduce((a, b) => a + b.amount, 0);

            const reminderEl = document.getElementById('export-reminder');
            if(!lastExport) {
                reminderEl.innerText = "Backup Notice: First export required!";
                reminderEl.className = "text-center p-2 rounded-lg text-[10px] font-bold uppercase tracking-wider bg-yellow-100 text-yellow-700";
            } else {
                const diffDays = Math.floor(Math.abs(now - new Date(lastExport)) / (1000 * 60 * 60 * 24));
                reminderEl.innerText = `Last Excel Export: ${diffDays} days ago`;
                reminderEl.className = diffDays > 7 ? "text-center p-2 rounded-lg text-[10px] font-bold uppercase tracking-wider bg-red-100 text-red-600" : "text-center p-2 rounded-lg text-[10px] font-bold uppercase tracking-wider bg-gray-100 text-gray-400";
            }
        }

        function renderCustomers() {
            const search = document.getElementById('customer-search').value.toLowerCase();
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            const customers = [...new Set(services.map(s => s.name))];
            
            const totalPending = services.filter(s => s.status === 'Pending').reduce((a, b) => a + b.amount, 0);
            document.getElementById('global-pending').innerText = `CAD ${totalPending}`;

            customers.filter(c => c.toLowerCase().includes(search)).forEach(name => {
                const userServices = services.filter(s => s.name === name);
                const pending = userServices.filter(s => s.status === 'Pending').reduce((a, b) => a + b.amount, 0);
                list.innerHTML += `
                    <div onclick="openProfile('${name}')" class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-gray-100 active:bg-blue-50">
                        <div><p class="font-bold text-lg text-slate-800">${name}</p><p class="text-[10px] text-gray-400 uppercase font-bold">${userServices.length} Sessions</p></div>
                        <div class="text-right"><p class="font-black ${pending > 0 ? 'text-red-500' : 'text-green-600'}">Unpaid: ${pending}</p></div>
                    </div>`;
            });
        }

        function openProfile(name) {
            currentProfileName = name;
            document.getElementById('modal-profile').classList.remove('hidden');
            renderProfileDetails();
        }

        function renderProfileDetails() {
            const filterValue = document.getElementById('history-filter')?.value.toLowerCase() || "";
            const name = currentProfileName
